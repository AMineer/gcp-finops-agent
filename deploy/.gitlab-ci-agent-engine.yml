# GitLab CI template for deploying gcp-finops-agent to Vertex AI Agent Engine
#
# This template assumes:
# 1. GitLab OIDC is configured with a workload identity provider
# 2. gcp-finops-agent@{PROJECT_ID}.iam.gserviceaccount.com exists with needed roles
# 3. AGENT_ENGINE_STAGING_BUCKET is set as a CI/CD variable or passed explicitly
#
# Usage in your .gitlab-ci.yml:
#
#   stages:
#     - test
#     - deploy-stage
#     - deploy-prod
#
#   include:
#     - local: deploy/.gitlab-ci-agent-engine.yml
#
#   variables:
#     GCP_PROJECT_ID: your-project-id
#     GCP_LOCATION: us-central1
#     SERVICE_ACCOUNT_EMAIL: your-agent@your-project-id.iam.gserviceaccount.com
#     AGENT_ENGINE_STAGING_BUCKET: gs://your-agent-engine-staging-bucket
#

variables:
  PYTHON_VERSION: "3.12"

.gcp-auth: &gcp-auth
  - echo "Authenticating with GCP via OIDC..."
  - |
    gcloud auth application-default login \
      --impersonate-service-account="${SERVICE_ACCOUNT_EMAIL}" \
      --impersonate-service-account-quota-scopes="https://www.googleapis.com/auth/cloud-platform"
  - gcloud auth application-default set-quota-project "$GCP_PROJECT_ID"

.setup-python: &setup-python
  - python --version
  - pip install --upgrade pip uv
  - uv pip install --system -e ".[dev]"

deploy-agent-engine:create:
  stage: deploy-stage
  image: python:$PYTHON_VERSION
  before_script:
    - *gcp-auth
    - *setup-python
  script:
    - echo "Deploying gcp-finops-agent to Vertex AI Agent Engine (CREATE)..."
    - |
      RESOURCE_NAME=$(python deploy/agent_engine_deploy.py --create \
        2>&1 | grep "Created Reasoning Engine:" | awk '{print $NF}')
    - echo "Created: $RESOURCE_NAME"
    - echo "$RESOURCE_NAME" > .engine-resource-name
  artifacts:
    paths:
      - .engine-resource-name
    expire_in: 30 days
  only:
    - main
  when: manual

deploy-agent-engine:update:
  stage: deploy-stage
  image: python:$PYTHON_VERSION
  before_script:
    - *gcp-auth
    - *setup-python
  script:
    - echo "Deploying gcp-finops-agent to Vertex AI Agent Engine (UPDATE)..."
    - |
      if [ -f .engine-resource-name ]; then
        RESOURCE_NAME=$(cat .engine-resource-name)
      else
        echo "ERROR: .engine-resource-name artifact not found"
        echo "Run 'deploy-agent-engine:create' first to initialize"
        exit 1
      fi
    - echo "Updating: $RESOURCE_NAME"
    - python deploy/agent_engine_deploy.py --update --resource-name "$RESOURCE_NAME"
  dependencies:
    - deploy-agent-engine:create
  only:
    - main
  when: manual

test:
  stage: test
  image: python:$PYTHON_VERSION
  script:
    - *setup-python
    - echo "Running tests..."
    - pytest tests/ -v || true  # Tests may need GCP creds; allow failure
    - echo "Running linting..."
    - ruff check .
  allow_failure: true
